<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schülerverwaltung</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="app-header">
  <div>
    <h1>Schülerverwaltung</h1>
    <p>Gürtelgrade und Prüfungsverlauf</p>
  </div>
</header>

<main class="layout">

<section class="card">

<h2>Schüler hinzufügen</h2>

<form id="studentForm">

<input type="hidden" id="studentId">

<div class="two-cols">

<label>
Vorname
<input id="firstName" required>
</label>

<label>
Nachname
<input id="lastName" required>
</label>

</div>

<label>
Geburtstag
<input type="date" id="birthday">
</label>

<label>
Aktueller Gürtelgrad
<input id="belt">
</label>

<div class="two-cols">

<label>
Jahressichtmarke
<select id="annualStamp">
<option value="ja">Ja</option>
<option value="nein">Nein</option>
</select>
</label>

<label>
Jahr
<input type="number" id="annualStampYear">
</label>

</div>

<label>
Notizen
<textarea id="notes"></textarea>
</label>

<button type="submit">Speichern</button>

</form>

</section>

<section class="card">

<h2>Schülerliste</h2>

<input id="searchInput" placeholder="Suchen">

<div id="studentsList"></div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
